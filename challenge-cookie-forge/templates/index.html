<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-900 text-white h-screen flex flex-col items-center justify-center font-mono">

    <div class="text-center space-y-6 bg-gray-800 p-10 rounded-lg shadow-xl border border-gray-700 w-96">
      <h1 class="text-3xl font-bold text-blue-400">System Access</h1>

      <p class="text-lg">Current Role: <span class="font-bold text-yellow-400">{{ role }}</span></p>

      {% if flag %}
      <div class="bg-green-900 text-green-400 p-4 rounded text-sm break-all mt-4 border border-green-500">
        Authentication Success.<br><br>
        {{ flag }}
      </div>
      {% else %}
      <div class="bg-red-900 text-red-400 p-4 rounded text-sm mt-4 border border-red-500">
        Access Denied. You must be an 'admin' to view the secure vault.
      </div>
      {% endif %}
    </div>
  </body>
</html>
